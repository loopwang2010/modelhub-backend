      Redoc renders the OpenAPI spec inline. The spec URL is served by the
      backend at /v1/openapi.yaml (production) OR mounted as a relative
      file in dev. For self-hosted operators who want a static-only docs
      site, drop a copy of proto/openapi.yaml next to this index.html and
      set spec-url accordingly.
    -->
    <redoc spec-url="/v1/openapi.yaml"></redoc>
