# modelhub.example.com — production virtual host.
# Replace MODELHUB_DOMAIN with your real domain.

upstream modelhub_backend {
  server modelhub-backend:6666;
  keepalive 32;
}

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name modelhub.example.com;
  return 301 https://$server_name$request_uri;
}

# HTTPS — main vhost
server {
  listen 443 ssl http2;
  server_name modelhub.example.com;

  # TLS — replace with Let's Encrypt or your CA cert.
  ssl_certificate /etc/nginx/certs/modelhub.crt;
  ssl_certificate_key /etc/nginx/certs/modelhub.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # ─── Static frontend (modelhub-web build output) ──────────
  root /var/www/modelhub;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # ─── API docs (S12.5 — Redoc + markdown samples) ──────────
  location /docs {
    alias /var/www/docs/api;
    try_files $uri $uri/ /api/index.html;
  }

  # OpenAPI spec served as a static file for Redoc to load.
  location = /v1/openapi.yaml {
    alias /var/www/proto/openapi.yaml;
    add_header Content-Type "application/yaml";
    add_header Access-Control-Allow-Origin "*";
  }

  # ─── API + admin → modelhub-backend ───────────────────────
  location /v1/ {
    proxy_pass http://modelhub_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;          # streaming responses
    proxy_read_timeout 600s;      # SSE / long polls
  }

  location /admin/ {
    proxy_pass http://modelhub_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── Webhook ingress (per AP-18 token URL) ────────────────
  # Long-form path includes a 256-bit per-task token. Provider POSTs land here.
  location ~ ^/v1/webhooks/[^/]+/[^/]+/[^/]+$ {
    proxy_pass http://modelhub_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Webhook bodies can be large (provider responses with base64 payloads).
    client_max_body_size 25M;
    # Strict limit to mitigate DoS on this auth-by-token surface.
    limit_req zone=webhooks burst=10 nodelay;
  }
}

# Rate-limit zone for webhook ingress (defined here so it sits outside any
# server block where it would be unreachable from the location above).
# The zone state lives in shared memory — 10m holds ~80k unique IPs.
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=20r/s;
