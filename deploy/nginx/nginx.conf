user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging — JSON-shaped so log shippers can parse easily.
  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request",'
    '"status":$status,"bytes":$body_bytes_sent,"referer":"$http_referer",'
    '"ua":"$http_user_agent","rt":$request_time,"upstream":"$upstream_addr"}';
  access_log /var/log/nginx/access.log json_combined;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 25M;   # Aligns with AP-17 upload cap (20M with margin)

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss text/xml application/yaml;

  # Default server: reject anything not matching a server_name. Drops
  # bot scans hitting the IP directly.
  server {
    listen 80 default_server;
    listen 443 ssl default_server;
    ssl_certificate /etc/nginx/certs/default.crt;
    ssl_certificate_key /etc/nginx/certs/default.key;
    return 444;
  }

  include /etc/nginx/conf.d/*.conf;
}
